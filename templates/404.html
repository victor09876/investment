{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(94,234,212,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(94,234,212,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 60% 60% at 50% 40%,black,transparent)"></div>
  <div style="text-align:center;max-width:480px;position:relative;z-index:1;">
    <div style="font-family:var(--ff-m);font-size:5.5rem;font-weight:700;color:var(--teal);line-height:1;letter-spacing:-.03em;text-shadow:0 0 40px var(--teal-glow);">404</div>
    <div style="width:64px;height:64px;background:var(--teal-glow);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:var(--teal);margin:1.5rem auto;">
      <i class="fa-solid fa-compass"></i>
    </div>
    <h1 style="font-family:var(--ff-d);font-size:1.5rem;font-weight:700;margin-bottom:.75rem;">Page Not Found</h1>
    <p style="color:var(--muted);font-size:.92rem;line-height:1.75;margin-bottom:2rem;">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <a href="/dashboard/" class="btn btn-primary btn-lg"><i class="fa-solid fa-house"></i> Back to Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-outline btn-lg"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
    </div>
  </div>
</div>
{% endblock %}
