{% extends 'layout.html' %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
  <div class="card">
    <div class="card-title" style="margin-bottom:1.25rem;"><i class="fa-solid fa-lock"></i>&nbsp; Change Your Password</div>
    <form method="post">{% csrf_token %}
      <div class="form-group"><label class="form-label">Current Password</label><div class="input-wrap"><span class="input-icon"><i class="fa-solid fa-lock"></i></span><input type="password" name="current_password" class="form-control" required></div>{% if form.errors %}<p class="form-error">{{ form.non_field_errors.0 }}</p>{% endif %}</div>
      <div class="form-group"><label class="form-label">New Password</label><div class="input-wrap"><span class="input-icon"><i class="fa-solid fa-lock"></i></span><input type="password" name="new_password" class="form-control" placeholder="Min 8 characters" required></div></div>
      <div class="form-group"><label class="form-label">Confirm New Password</label><div class="input-wrap"><span class="input-icon"><i class="fa-solid fa-lock"></i></span><input type="password" name="confirm_password" class="form-control" required></div></div>
      <div style="display:flex;gap:9px;"><a href="{% url 'settings' %}" class="btn btn-ghost">Cancel</a><button type="submit" class="btn btn-primary">Update Password</button></div>
    </form>
  </div>
</div>
{% endblock %}
