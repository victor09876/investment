<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#06080D;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:480px;margin:0 auto;padding:32px 24px;">
    <div style="background:#0D1117;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:28px;">
      <h2 style="color:#F5F7FA;font-size:18px;margin:0 0 16px;">New Contact Form Submission</h2>
      <table style="width:100%;font-size:14px;color:#8B96A8;">
        <tr><td style="padding:6px 0;font-weight:bold;color:#F5F7FA;width:80px;">Name:</td><td>{{ name }}</td></tr>
        <tr><td style="padding:6px 0;font-weight:bold;color:#F5F7FA;">Email:</td><td>{{ email }}</td></tr>
        <tr><td style="padding:6px 0;font-weight:bold;color:#F5F7FA;">Subject:</td><td>{{ subject|default:"(no subject)" }}</td></tr>
      </table>
      <div style="margin-top:16px;padding:14px;background:#141B26;border-radius:8px;color:#F5F7FA;font-size:14px;line-height:1.7;white-space:pre-wrap;">{{ message }}</div>
    </div>
  </div>
</body></html>
