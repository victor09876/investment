{% extends 'base.html' %}{% load static %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden;">
  <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(94,234,212,.06),transparent 70%);top:-100px;right:-100px;"></div>
  <div style="width:100%;max-width:420px;position:relative;z-index:1;">
    <div class="auth-logo" style="margin-bottom:2rem;"><div class="auth-logo-icon"><i class="fa-solid fa-sack-dollar"></i></div><span class="auth-logo-text">Invest<span style="color:var(--gold);">Pro</span></span></div>
    <div style="width:60px;height:60px;background:rgba(94,234,212,.1);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.65rem;margin-bottom:1.4rem;color:var(--teal);"><i class="fa-solid fa-lock-open"></i></div>
    <h2 style="font-size:1.6rem;margin-bottom:7px;">Set a new password</h2>
    <p style="color:var(--faint);font-size:.88rem;margin-bottom:1.75rem;">Choose a strong password for your account.</p>
    <form method="post">{% csrf_token %}
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrap"><span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password" id="pw1" class="form-control" placeholder="Min. 8 characters" minlength="8" required>
          <button type="button" onclick="togglePw('pw1',this)" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--faint);cursor:pointer;"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrap"><span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password2" id="pw2" class="form-control" placeholder="Re-enter password" minlength="8" required>
          <button type="button" onclick="togglePw('pw2',this)" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--faint);cursor:pointer;"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Reset Password</button>
    </form>
    <p class="auth-footer" style="margin-top:1.5rem;"><a href="{% url 'login' %}" style="color:var(--muted);font-size:.84rem;"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a></p>
  </div>
</div>
{% endblock %}
{% block extra_js %}<script>function togglePw(id,b){const i=document.getElementById(id);i.type=i.type==='text'?'password':'text';b.innerHTML=i.type==='text'?'<i class="fa-solid fa-eye-slash"></i>':'<i class="fa-solid fa-eye"></i>';}</script>{% endblock %}
